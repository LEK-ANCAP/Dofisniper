services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: dofimall-backend
    restart: always
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/dofimall_sniper.db
    volumes:
      - ./backend/screenshots:/app/screenshots
      - ./backend/logs:/app/logs
      - db-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dofimall

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: dofimall-frontend
    restart: always
    environment:
      - VIRTUAL_HOST=dofisniper.odubasolar.com,www.dofisniper.odubasolar.com
      - LETSENCRYPT_HOST=dofisniper.odubasolar.com,www.dofisniper.odubasolar.com
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dofimall

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d:ro
      - html:/usr/share/nginx/html:ro
      - conf:/etc/nginx/conf.d:rw
    restart: always
    networks:
      - dofimall

  docker-gen:
    image: nginxproxy/docker-gen
    container_name: nginx-proxy-gen
    command: -watch -wait 5s:30s -notify "nginx -s reload" /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro
      - conf:/etc/nginx/conf.d:rw
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d:ro
      - html:/usr/share/nginx/html:ro
    labels:
      - "com.github.nginx-proxy.docker-gen"
    restart: always
    networks:
      - dofimall

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    environment:
      - DEFAULT_EMAIL=admin@odubasolar.com
      - NGINX_PROXY_CONTAINER=nginx-proxy
      - NGINX_DOCKER_GEN_CONTAINER=nginx-proxy-gen
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs:rw
      - vhost:/etc/nginx/vhost.d:rw
      - html:/usr/share/nginx/html:rw
      - acme:/etc/acme.sh:rw
    depends_on:
      - nginx-proxy
      - docker-gen
    restart: always
    networks:
      - dofimall

volumes:
  db-data:
  certs:
  vhost:
  html:
  acme:
  conf:

networks:
  dofimall:
    driver: bridge
