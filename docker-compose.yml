services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: dofimall-backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/dofimall_sniper.db
    volumes:
      - ./backend/screenshots:/app/screenshots
      - ./backend/logs:/app/logs
      - db-data:/app/data
    restart: unless-stopped
    networks:
      - dofimall

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: dofimall-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dofimall

volumes:
  db-data:

networks:
  dofimall:
    driver: bridge
