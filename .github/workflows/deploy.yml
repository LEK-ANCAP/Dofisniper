name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Crear Tarball del Proyecto
      run: |
        tar -czvf deploy.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='venv' \
          --exclude='.venv' \
          --exclude='__pycache__' \
          --exclude='backend/browser_data' \
          --exclude='backend/logs' \
          --exclude='*.db' \
          --exclude='*.log' \
          --exclude='frontend/node_modules' \
          --exclude='frontend/dist' \
          .

    - name: Transferir Tarball al VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        source: "deploy.tar.gz"
        target: "/root"

    - name: Extraer y Reiniciar Docker Containers
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        script: |
          # Asegurar dependencias del sistema
          apt-get update && apt-get install -y docker.io docker-compose tar
          
          # Mover y descomprimir
          mkdir -p /root/dofimall-sniper
          tar -xzvf /root/deploy.tar.gz -C /root/dofimall-sniper
          rm /root/deploy.tar.gz
          
          # Navigate to project directory
          cd /root/dofimall-sniper

          # Build and launch
          echo "Building Docker containers..."
          docker-compose build
          
          echo "Starting Docker containers..."
          docker-compose up -d
          
          # Clean up any dangling images to free up VPS space
          docker image prune -f
