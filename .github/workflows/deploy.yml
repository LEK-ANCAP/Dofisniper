name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Transfer Project Files to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        source: "."
        target: "/root/dofimall-sniper"
        rm: false
        # Ignore virtual environments, git data, generated database, node_modules, and cache
        exclude: |
          .git/
          .github/
          venv/
          .venv/
          __pycache__/
          backend/browser_data/
          backend/logs/
          backend/*.db
          backend/*.log
          frontend/node_modules/
          frontend/dist/
          deploy.py
          deploy.zip

    - name: Rebuild and Restart Docker Containers
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        script: |
          # Ensure Docker and Compose are installed (skip if already installed)
          apt-get update && apt-get install -y docker.io docker-compose unzip
          
          # Navigate to project directory
          cd /root/dofimall-sniper

          # Build and launch
          echo "Building Docker containers..."
          docker-compose build
          
          echo "Starting Docker containers..."
          docker-compose up -d
          
          # Clean up any dangling images to free up VPS space
          docker image prune -f
